<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SANKALP - AI Tutor Chatbot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      height: 600px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .mode-selector {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      padding: 0 20px;
    }

    .mode-btn {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid white;
      background: transparent;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .mode-btn.active {
      background: white;
      color: #667eea;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f7f7f7;
    }

    .message {
      margin-bottom: 15px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      display: flex;
      justify-content: flex-end;
    }

    .message.ai {
      display: flex;
      justify-content: flex-start;
    }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 10px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .user .message-content {
      background: #667eea;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .ai .message-content {
      background: #e0e0e0;
      color: #333;
      border-bottom-left-radius: 4px;
    }

    .loading {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .loading span {
      width: 8px;
      height: 8px;
      background: #667eea;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .loading span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        opacity: 0.3;
      }
      40% {
        opacity: 1;
      }
    }

    .input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }

    .input-area input:focus {
      border-color: #667eea;
    }

    .input-area button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .input-area button:hover {
      transform: translateY(-2px);
    }

    .input-area button:active {
      transform: translateY(0);
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      border-left: 4px solid #c33;
    }

    .info {
      background: #e8f4f8;
      color: #0066cc;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      border-left: 4px solid #0066cc;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 SANKALP AI Tutor</h1>
      <p>Your personal learning companion</p>
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="learning">📚 Learning</button>
        <button class="mode-btn" data-mode="assessment">✏️ Assessment</button>
      </div>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="info">
        💡 Welcome to SANKALP AI Tutor! Ask any question about your STEM topics. I'm here to help!
      </div>
    </div>

    <div class="input-area">
      <input 
        type="text" 
        id="messageInput" 
        placeholder="Ask a question..." 
        autocomplete="off"
      >
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const modeButtons = document.querySelectorAll('.mode-btn');
    
    let currentMode = 'learning';
    let isLoading = false;

    // Mode selection
    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        modeButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
      });
    });

    // Send message
    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message || isLoading) return;

      // Add user message to chat
      addMessage(message, 'user');
      messageInput.value = '';
      isLoading = true;

      // Show loading indicator
      showLoading();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: message,
            mode: currentMode,
            context: 'STEM Education - Grades 6-12'
          })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Failed to get response');
        }

        const data = await response.json();
        removeLoading();
        addMessage(data.reply, 'ai');
      } catch (error) {
        removeLoading();
        addError('Error: ' + error.message);
      } finally {
        isLoading = false;
      }
    }

    function addMessage(text, sender) {
      const messageEl = document.createElement('div');
      messageEl.className = `message ${sender}`;
      messageEl.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
      chatBox.appendChild(messageEl);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addError(text) {
      const errorEl = document.createElement('div');
      errorEl.className = 'error';
      errorEl.textContent = text;
      chatBox.appendChild(errorEl);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showLoading() {
      const loadingEl = document.createElement('div');
      loadingEl.className = 'message ai';
      loadingEl.id = 'loading';
      loadingEl.innerHTML = `
        <div class="message-content">
          <div class="loading">
            <span></span><span></span><span></span>
          </div>
        </div>
      `;
      chatBox.appendChild(loadingEl);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeLoading() {
      const loading = document.getElementById('loading');
      if (loading) loading.remove();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Event listeners
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
